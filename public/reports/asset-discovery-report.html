<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illustrative Asset Discovery Report</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f1ea;
        color: #172f52;
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        margin: 0 auto;
        max-width: 1180px;
        min-height: 100vh;
        padding: 24px 16px 40px;
      }

      .intro {
        margin: 0 auto 20px;
        max-width: 860px;
        text-align: center;
      }

      h1 {
        font-size: clamp(1.5rem, 3vw, 2.25rem);
        margin: 0;
      }

      p {
        color: #52627b;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: clamp(0.95rem, 2vw, 1rem);
        line-height: 1.6;
        margin: 12px 0 0;
      }

      .report-frame {
        background: #ffffff;
        border: 1px solid #d7d0c6;
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(23, 47, 82, 0.08);
        overflow: hidden;
      }

      img {
        display: block;
        height: auto;
        width: 100%;
      }

      @media (max-width: 640px) {
        main {
          padding: 16px 10px 24px;
        }

        .report-frame {
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <h1>Illustrative Asset Discovery Report</h1>
        <p>
          Sample report shown for demonstration purposes only. The report image
          scales to the width of the screen for easier viewing on mobile and
          desktop.
        </p>
      </section>

      <section class="report-frame">
        <img
          src="/reports/sample-report.png"
          alt="Illustrative Asset Discovery Report sample"
        />
      </section>
    </main>
  </body>
</html>
